<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Search and compare Project Gorgon brewing effects, recipe levels, ingredients, usage types, and community brewers."
    />
    <meta name="theme-color" content="#1c2d39" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('brewing-ledger-theme');
          const theme = stored === 'light' || stored === 'dark'
            ? stored
            : matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {}
      })();
    </script>
    <title>Brewing Ledger · Project Gorgon</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
